  meta:
    description:
      default: HopHub es una plataforma de viajes compartidos para eventos.
      event: |
        Ofertas de viaje para %{event_name} en HopHub.
      entry: |
        Oferta de viaje de %{name} para %{event_name} en HopHub.

  terms_and_conditions:
    prompt: |
      ¿Has leído los %{tos} y la %{privacy_policy}?
      También, asegúrate de que no eres un robot.
      Según tu dispositivo, el proceso de verificación puede tomar un poco de tiempo.
    accepted: |
      Los %{tos} y la %{privacy_policy} han sido leídos y aceptados.
      Tampoco eres un robot. Genial.
    error: |
      Por favor, confirma que has leído y aceptado los términos de servicio y la política de privacidad.
      Tambien asegúrate de que no eres un robot.

  welcome:
    title: ¿Qué es esto?
    text:
      - |
        HopHub es una plataforma de viajes compartidos que facilita el viaje conjunto a eventos
        y con ello pretende hacer un mundo un poco mejor. No importa si llenas el coche, compartes
        un billete de tren, viajas en autobús, planeas un paseo en bicicleta o caminas.

  how-it-works:
    title: ¿Cómo funciona?
    create-event:
      title: Crea un evento
      text: |
        Creas un nuevo evento y compartes el enlace con posibles participantes.
        Solo las personas con el enlace pueden ver el evento.
    add-offer:
      title: Ofrece un viaje compartido
      text: |
        Las personas que deseen ofrecer un viaje compartido pueden publicar una oferta.
        Esto se aplica a plazas en coche, pero también a viajes compartidos en tren, autobús, bicicleta o a pie.
        No es necesario registrarse, solo se requiere una dirección de correo electrónico a
        la que enviaremos un correo electrónico de confirmación.
        Una vez confirmado, la entrada se mostrará.
    match:
      title: Contactar
      text: |
        En caso de coincidencia, las personas pueden ponerse en contacto a través de un formulario web en el sitio web.
        La dirección de correo electrónico del contacto se utiliza como dirección de respuesta para que el
        destinatario pueda responder directamente.
    no-indexing:
      title: No indexar por motores de búsqueda
      text: |
        Motores de búsqueda como Google o Bing no indexan los eventos
        y las ofertas y solicitudes correspondientes utilizando etiquetas especiales.
        Solo las personas con el enlace pueden ver los eventos.
    cleanup:
      title: No dejar rastro
      text: |
        Las ofertas, solicitudes y eventos se eliminan automáticamente de la base de datos
        una vez que su validez ha expirado.

  hosting-an-event:
    title: Crea tu propio evento
    text: |
      ¿Sabes de un evento al que la gente quiere ir en grupo?
      Entonces crea un evento y comparte el enlace con los participantes.

  about:
    title: El proyecto
    text:
      - |
        HopHub es un proyecto de código abierto desarrollado por voluntarios.
        No somos una empresa y no tenemos intereses comerciales.
        No te molestamos con publicidad y no compartimos datos con terceros.
        Solo se almacenan los datos absolutamente necesarios para el funcionamiento de la plataforma.
        Más información en nuestra %{privacy_policy} y %{tos}.
      - |
        Si deseas informar un error, sugerir una función, agregar una traducción o enviar un PR,
        puedes encontrar el código fuente en %{github_project}.
      - |
        HopHub es completamente gratuito y siempre lo será.

