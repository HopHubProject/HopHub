        driver-needed: ¿Buscas conductor?
        driver-offer: ¿Ofreces conducir?
        notes: Notas adicionales

      ride_request:
        email: Tu dirección de correo electrónico
        direction: Dirección
        location: Ubicación (código postal)
        country: País
        radius: Radio de búsqueda
        start_date: Hora de salida más temprana
        end_date: Hora de llegada límite

      contact_email:
        from: Tu dirección de correo electrónico
        text: Tu mensaje

    hints:
      event:
        name: |
          Este es el nombre del evento que se mostrará en la página del evento.
          También lo usamos para generar la URL del evento.
        description: |
          La descripción también se mostrará en la página del evento y puede dar a los visitantes algo de contexto sobre el evento.
          Puedes usar la sintaxis %{markdown} para dar formato al texto.
        admin_email: |
          Esta dirección de correo electrónico se utiliza para enviarte una confirmación y un enlace de administración.
          No se mostrará en el sitio web. Solo lo guardamos mientras el evento esté activo.
          Después de que el evento haya finalizado, la dirección de correo electrónico se eliminará permanentemente.
        end_date: |
          Todas las detalles sobre el evento, incluyendo tu dirección de correo electrónico así como
          todas las ofertas del evento se eliminarán permanentemente después de esta fecha.
        default_country:
          Este es el país predeterminado para nuevas ofertas que se utilizará para búsquedas de códigos postales.

      ride_request:
        email: |
          Tu dirección de correo electrónico no es visible para nadie.
          La usamos para notificarte cuando se publique una oferta que coincida.
          Debes confirmar tu dirección de correo electrónico antes de que tu solicitud esté activa.
        direction: ¿Buscas un viaje al evento o de vuelta a casa?
        location: El código postal donde quieres comenzar (ida) o donde quieres ir (vuelta).
        country: El país donde se encuentra el código postal.
        radius: ¿Hasta qué distancia estás dispuesto a viajar?
        start_date: ¿Cuál es la hora más temprana a la que te gustaría viajar?
        end_date: ¿Para cuándo quieres haber llegado a más tardar? Tu solicitud se eliminará automáticamente después de ese momento.

      offer:
        name: |
          Tu nombre, tal como se mostrará públicamente en el sitio web.
          No tiene que ser tu nombre real, un seudónimo está totalmente bien.
        transport: El medio de transporte que utilizarás.
        email: |
          Tu dirección de correo electrónico no es visible para nadie.
          La usamos para enviarte un correo electrónico una vez que alguien quiera ponerse en contacto contigo.
          Debes confirmar tu dirección de correo electrónico antes de que tu oferta se muestre en el sitio web.
        date: Fecha y hora en la que quieres comenzar tu viaje.
        direction: La dirección en la que quieres viajar.
        location: El código postal donde quieres comenzar (ida) o donde quieres ir (vuelta).
        country: El país donde se encuentra el código postal.
        seats-available: El número de asientos disponibles.
        seats-needed: El número de asientos necesarios.
        driver-needed: |
          Si buscas un conductor para este viaje, marca esta casilla.
        driver-offer: |
          Si ofreces conducir a otras personas, marca esta casilla.

        notes: |
          Cualquier nota adicional que quieras compartir con otros.
          Puedes usar este campo para compartir tu número de teléfono, forma de contacto preferida, etc.
          Ten en cuenta que esta información se mostrará públicamente en el sitio web.

      contact_email:
        name: |
          Tu nombre se mostrará en el correo electrónico que %{name} recibirá.
        from: |
          Tu dirección de correo electrónico se utilizará como dirección de respuesta para que %{name} pueda responderte directamente.
        text: |
          Tu mensaje a %{name}. Sé amable y proporciona tanta información como sea posible.

    placeholders:
      event:
        name: Tu nombre o seudónimo
        description: ¿De qué trata el evento?
        admin_email: Ingresa tu dirección de correo electrónico
        end_date: ¿Cuándo finalizará el evento?
      offer:
        name: Ingresa tu nombre
        email: Ingresa tu dirección de correo electrónico
        location: Ingresa un código postal
        date: Selecciona la fecha y hora de tu viaje
        notes: ¿Tienes alguna nota adicional? Compártela aquí.
      offers_filter:
        location: Código postal
      contact_email:
        name: Nombre o seudónimo
        from: Dirección de correo electrónico

    errors:
      offer:
        location:
          invalid: Por favor, introduce un código postal válido.

  time:
    formats:
      default: "%d.%m.%Y %H:%M"
      short: "%d.%m. %H:%M"
      long: "%d. %B %Y %H:%M"
      time: "%H:%M"

  date:
    formats:
      long_with_dow: "%A, %d. %B %Y"
    month_names: [~, Enero, Febrero, Marzo, Abril, Mayo, Junio, Julio, Agosto, Septiembre, Octubre, Noviembre, Diciembre]

