      ¿Estás seguro de que quieres eliminar este evento?
      Todas las ofertas también se eliminarán permanentemente.
      Esta acción no se puede deshacer.

  entry_delete:
    title: Eliminar entrada
    confirmation: |
      ¿Estás seguro de que quieres eliminar esta entrada?
      Esta acción no se puede deshacer.

  create_new_offer:
    title: Crear nueva oferta
    text: |
      Por favor, introduce los detalles de tu oferta. Recibirás un correo electrónico con
      un enlace para confirmar tu oferta. Una vez confirmado, la oferta se mostrará en el sitio web.

  update_offer:
    title: Actualizar oferta

  entries:
    text: |
      Aquí encontrarás todas las %{type} para este evento.

    none: No se encontraron entradas

    filter:
      title: Filtrar
      apply: Aplicar filtro
      clear: Limpiar
      text: Filtra las ofertas para este evento por ubicación y radio.
      active: |
        El filtro coincide con %{n} de %{total} ofertas.

  entry_contact:
    title: Contacto
    send: Enviar correo
    text: |
      Por favor, completa el formulario para contactar a %{name}.
    warning: |
      Esta información se enviará a %{name} y no se almacenará en la base de datos.
      HopHub no tiene control sobre lo que %{name} hace con esta información.

  gdpr_inquiry:
    title: Solicitud de GDPR
    text:
      - |
        HopHub solo almacena datos que son necesarios para el funcionamiento de la plataforma.
        Todos los datos se eliminan automáticamente una vez que ya no son necesarios. Específicamente,
        esto significa que los eventos, incluidas todas las ofertas, se eliminan permanentemente
        después de la fecha de finalización del evento. Las ofertas también se eliminan una vez
        que ya no son válidas.
      - |
        Si deseas tener una copia de tus datos o que se eliminen tus datos, por favor completa el formulario.
        Te enviaremos un correo electrónico con toda la información almacenada en nuestra base de datos con
        esta dirección de correo electrónico y enlaces para eliminar tus datos.
      - |
        La dirección de correo electrónico que proporciones aquí solo se utilizará para responder a tu consulta
        y luego se eliminará.
    links: |
      Más información en nuestra %{privacy_policy} y %{tos}.
    send: Enviar solicitud

  views:
