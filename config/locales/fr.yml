    hints:
      event:
        name: |
          C'est le nom de l'événement qui sera affiché sur la page de l'événement.
          Nous l'utilisons aussi pour générer l'URL de l'événement.
        description: |
          La description est également affichée sur la page de l'événement et peut donner aux visiteurs un peu de contexte sur l'événement.
          Tu peux utiliser %{markdown} dans ce champ pour mettre en forme le texte.
        admin_email: |
          Cette adresse e-mail est utilisée pour t'envoyer une confirmation et un lien d'administration.
          Elle n'est pas affichée sur le site. Nous la conservons uniquement tant que l'événement est actif,
          puis elle est définitivement supprimée.
        end_date: |
          Tous les détails de cet événement, y compris l'adresse e-mail indiquée, ainsi que
          toutes les offres et demandes de covoiturage de l'événement seront définitivement supprimés après cette date.
        default_country: |
          Le pays présélectionné lors de la création d'une nouvelle offre et dans le filtre des offres,
          et qui est utilisé pour la saisie du code postal.

      ride_request:
        email: |
          Ton adresse e-mail n'est visible par personne.
          Nous l'utilisons pour te prévenir dès qu'une offre correspondante est publiée.
          Tu dois confirmer ton adresse e-mail avant que ta demande soit active.
        direction: Cherches-tu un covoiturage vers l'événement ou pour rentrer ?
        location: À quel code postal ton trajet doit-il commencer (aller) ou se terminer (retour) ?
        country: Le pays dans lequel se trouve le code postal.
        radius: Jusqu'où es-tu prêt·e à te déplacer ?
        start_date: Quand souhaites-tu partir au plus tôt ?
        end_date: À quelle heure souhaites-tu arriver au plus tard ? Ta demande sera automatiquement supprimée après ce moment.

      offer:
        name: |
          Ton nom, tel qu'il sera affiché publiquement sur le site.
          Ce n'est pas forcément ton vrai nom, un pseudonyme convient tout à fait.
        transport: Le moyen de transport que tu veux utiliser.
        email: |
          Ton adresse e-mail n'est visible par personne.
          Nous l'utilisons pour t'envoyer un e-mail dès que quelqu'un souhaite prendre contact avec toi.
          Tu dois confirmer ton adresse e-mail avant que ton offre soit affichée sur le site.
        date: Date et heure auxquelles tu souhaites commencer ton trajet.
        direction: La direction dans laquelle tu souhaites voyager.
        location: À quel code postal le trajet doit-il commencer (aller) ou se terminer (retour) ?
        country: Le pays dans lequel se trouve le code postal.
        seats-available: Le nombre de places disponibles.
        seats-needed: Le nombre de places nécessaires.
        driver-needed: |
          Cherche-t-on encore une personne pour conduire la voiture sur ce trajet ? Si oui, coche cette case.
        driver-offer: |
          Pourrais-tu envisager de conduire la voiture ?
        notes: |
          Toutes les notes supplémentaires que tu souhaites partager publiquement avec d'autres.
          Tu peux aussi indiquer ici ton numéro de téléphone, ton mode de contact préféré ou
          d'autres informations. Note bien que tout ce que tu indiques ici
          est visible publiquement.

      contact_email:
        name: |
          Ton nom sera transmis dans l'e-mail à %{name}.
        from: |
          Ton adresse e-mail sera transmise à %{name} et utilisée comme adresse de réponse,
          afin que vous puissiez poursuivre votre communication en dehors de HopHub.
        text: |
          Ton message à %{name}. Sois aimable et donne autant d'informations que possible.

