  meta:
    description:
      default: HopHub est une plateforme de covoiturage pour les événements.
      event: |
        Offres de covoiturage pour %{event_name} sur HopHub.
      offer: |
        Offre de covoiturage de %{name} pour %{event_name} sur HopHub.

  terms_and_conditions:
    prompt: |
      J'ai lu et j'accepte les %{tos} et la %{privacy_policy}.
      Je confirme également que je ne suis pas un robot. Selon ton appareil,
      la vérification peut prendre un instant.
    accepted: |
      Les %{tos} et la %{privacy_policy} ont été lues et acceptées.
      Et tu n'es pas un robot non plus. Parfait.
    error: |
      Merci de confirmer que tu as lu et accepté les conditions d'utilisation et la politique de confidentialité.
      Vérifie aussi encore une fois que tu n'es pas un robot.

  welcome:
    title: Qu'est-ce que c'est ?
    text:
      - |
        HopHub est une plateforme de covoiturage qui veut simplifier les trajets
        partagés vers les événements et ainsi rendre le monde un peu meilleur. Que
        vous remplissiez la voiture, partagiez un billet de train, preniez le bus
        ensemble, planifiiez une sortie à vélo ou veniez à pied.

  how-it-works:
    title: Comment ça marche ?
    create-event:
      title: Crée un événement
      text: |
        Tu crées un nouvel événement et tu partages le lien avec les personnes
        susceptibles d'y participer. Seules les personnes disposant du lien peuvent voir l'événement.
    add-offer:
      title: Propose un covoiturage
      text: |
        Les personnes qui souhaitent proposer un trajet peuvent maintenant publier une offre.
        Cela vaut pour les places en voiture, mais aussi pour un trajet partagé en train,
        en bus, à vélo ou à pied.
        Aucune inscription n'est nécessaire, juste une adresse e-mail à laquelle nous envoyons un
        e-mail de confirmation. Une fois la confirmation effectuée, l'offre est affichée.
    ride-request:
      title: Tu cherches un covoiturage ?
      text: |
        Si aucune offre correspondante n'existe encore, tu peux à la place publier une
        demande de covoiturage. Dis-nous à peu près où tu es et quand tu souhaites voyager –
        nous t'enverrons un e-mail dès que quelqu'un publie une offre correspondante.
    match:
      title: Prends contact
      text: |
        Si tu as publié une demande de covoiturage, tu reçois automatiquement un e-mail dès
        qu'une offre correspondant à ton trajet et à ta fenêtre horaire est publiée — pas besoin
        de revenir vérifier la page. En cas de correspondance, les personnes peuvent entrer en
        contact les unes avec les autres. Les offres peuvent indiquer des messageries, afin que
        tu puisses prendre contact directement par ce biais. Tu peux aussi utiliser un formulaire
        web sur le site ; l'adresse e-mail de la personne qui prend contact est utilisée comme
        adresse de réponse, afin que la destinataire puisse répondre directement.
    no-indexing:
      title: Pas d'indexation par les moteurs de recherche
      text: |
        Les moteurs de recherche comme Google ou Bing sont invités, à l'aide de balises spéciales,
        à ne pas indexer les événements et les offres associées.
        Seules les personnes disposant du lien peuvent voir les événements.
    cleanup:
      title: Ne laisse aucune trace
      text: |
        Les offres, les demandes de covoiturage et les événements sont automatiquement supprimés
        de la base de données une fois leur validité expirée.

  about:
    title: Le projet
    text:
      - |
        HopHub est un projet open source développé par des bénévoles.
        Nous ne sommes pas une entreprise et n'avons aucun intérêt commercial.
        Nous ne t'embêtons pas avec de la publicité et ne transmettons aucune donnée à des tiers.
        Seules les données absolument nécessaires au fonctionnement de la plateforme
        sont conservées. Plus d'informations dans notre %{privacy_policy} et nos %{tos}.
      - |
        Si tu veux signaler un bug, proposer une fonctionnalité, ajouter une traduction ou
        soumettre une PR, tu trouveras le code source sur %{github_project}.
      - |
        HopHub est entièrement gratuit et le restera toujours.

