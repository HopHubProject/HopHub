    title: Contact
    title_alternative: Ou contacter par e-mail
    send: Envoyer l'e-mail
    text: |
      Merci de remplir le formulaire pour contacter %{name}.
    text_alternative: |
      Ou remplis ce formulaire pour joindre %{name} par e-mail à la place,
      si tu ne souhaites pas utiliser les options de contact ci-dessus.
    warning: |
      Ces informations seront envoyées à %{name} et ne seront pas conservées dans la base de données de HopHub.
      HopHub n'a aucun contrôle sur ce que %{name} fait de ces informations.
    kind:
      phone: Téléphone
      sms: SMS
      signal: Signal
      whatsapp: WhatsApp
      telegram: Telegram
      instagram: Instagram
    hint:
      intro: Indique ici toutes les messageries par lesquelles d'autres peuvent te joindre. Les numéros de téléphone doivent commencer par + et l'indicatif du pays (par ex. +491234567890). Signal et Telegram acceptent aussi un nom d'utilisateur. Pour Instagram, indique seulement ton nom de compte, pas de lien de profil.
      phone: Facultatif. Numéro de téléphone — doit commencer par + et l'indicatif du pays (par ex. +491234567890).
      sms: Facultatif. Numéro de téléphone pour SMS — doit commencer par + et l'indicatif du pays (par ex. +491234567890).
      signal: Facultatif. Ton nom d'utilisateur Signal (par ex. tonnom.42), un numéro de téléphone (doit commencer par + et l'indicatif du pays, par ex. +491234567890) ou ton lien Signal personnel (https://signal.me/#eu/...).
      whatsapp: Facultatif. Numéro de téléphone WhatsApp — doit commencer par + et l'indicatif du pays (par ex. +491234567890).
      telegram: Facultatif. Nom d'utilisateur Telegram (par ex. @tonnom) ou numéro de téléphone — les numéros de téléphone doivent commencer par + et l'indicatif du pays (par ex. +491234567890).
      instagram: Facultatif. Seulement ton nom de compte Instagram (par ex. @tonnom ou tonnom) — pas de lien de profil.

  gdpr_inquiry:
    title: Demande RGPD
    text:
      - |
        HopHub ne conserve que les données nécessaires au fonctionnement de la plateforme.
        Toutes les données sont automatiquement supprimées dès qu'elles ne sont plus nécessaires.
        Concrètement, cela signifie que les événements ainsi que toutes leurs offres et demandes
        de covoiturage sont définitivement supprimés après la date de fin de l'événement. Les offres sont
        également supprimées dès qu'elles ne sont plus valables.
      - |
        Si tu souhaites une copie de tes données ou leur suppression,
        merci de remplir le formulaire. Nous t'enverrons un e-mail avec toutes les informations
        enregistrées sous cette adresse e-mail dans notre base de données, ainsi que des liens pour
        les supprimer.
      - |
        L'adresse e-mail que tu indiques ici sera utilisée uniquement pour répondre à ta demande
        puis supprimée.
    links: |
      Tu trouveras plus d'informations dans notre %{privacy_policy} et nos %{tos}.
    send: Envoyer la demande

