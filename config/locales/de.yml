        email: Deine E-Mail-Adresse
        phone: Deine Telefonnummer
        date: Datum und Uhrzeit
        direction: Richtung
        transport: Verkehrsmittel
        starting-point: Start
        location: Ort (Postleitzahl)
        country: Land
        seats: Anzahl der Plätze
        driver-needed: Fahrer:in gesucht?
        driver-offer: Kannst du fahren?
        notes: Zusätzliche Notizen

      ride_request:
        email: Deine E-Mail-Adresse
        direction: Richtung
        location: Ort (Postleitzahl)
        country: Land
        radius: Suchradius
        start_date: Frühester Startzeitpunkt
        end_date: Spätester Ankunftszeitpunkt

      contact_email:
        from: Deine E-Mail-Adresse
        text: Deine Nachricht

    hints:
      event:
        name: |
          Dies ist der Name des Events, der auf der Eventseite angezeigt wird.
          Wir verwenden ihn auch, um die URL des Events zu generieren.
        description: |
          Die Beschreibung wird auch auf der Eventseite angezeigt und kann den Besuchern etwas Kontext zum Event geben.
          Du kannst in diesem Feld %{markdown} verwenden, um den Text zu formatieren.
        admin_email: |
          Diese E-Mail-Adresse wird verwendet, um dir eine Bestätigung und einen Administrationslink zu senden.
          Sie wird nicht auf der Website angezeigt. Wir speichern sie nur, solange der Event aktiv ist,
          danach wird sie dauerhaft gelöscht.
        end_date: |
          Alle Details zu diesem Event inklusive der angegebenen E-Mail-Adresse sowie
          alle Angebote des Events werden nach diesem Datum dauerhaft gelöscht.
        default_country: |
          Das Land, das beim Erstellen eines neuen Angebots und beim Angebotsfilter vorausgewählt ist
          und das für die Eingabe der Postleitzahl verwendet wird.

      ride_request:
        email: |
          Deine E-Mail-Adresse ist für niemanden sichtbar.
          Wir verwenden sie, um dich zu benachrichtigen, sobald ein passendes Angebot eingestellt wird.
          Du musst deine E-Mail-Adresse bestätigen, bevor deine Anfrage aktiv ist.
        direction: Suchst du eine Mitfahrgelegenheit zum Event oder nach Hause?
        location: Bei welcher Postleitzahl soll deine Reise starten (Hinweg) bzw. enden (Rückweg)?
        country: Das Land in dem sich die Postleitzahl befindet.
        radius: Wie weit bist du bereit zu fahren?
        start_date: Wann möchtest du frühestens losfahren?
        end_date: Bis wann möchtest du spätestens da sein? Deine Anfrage wird nach diesem Zeitpunkt automatisch entfernt.

      entry:
        name: |
          Dein Name, wie er auf der Website öffentlich angezeigt werden soll.
          Das muss nicht dein richtiger Name sein, ein Pseudonym ist voll okay.
        transport: Das Verkehrsmittel, das du benutzen willst.
        email: |
          Deine E-Mail-Adresse ist für niemanden sichtbar.
          Wir verwenden sie, um dir eine E-Mail zu senden, sobald jemand Kontakt mit dir aufnehmen möchte.
          Du musst deine E-Mail-Adresse bestätigen, bevor dein Angebot auf der Website angezeigt wird.
        phone: Eine Telefonnummer ist optional. Wenn du sie angibst, wird sie anderen angezeigt.
        date: Datum und Uhrzeit, zu der du deine Reise beginnen möchtest.
        direction: Die Richtung, in die du reisen möchtest.
        location: Bei welcher Postleitzahl soll die Reise starten (Hinweg) bzw. enden (Rückweg)?
        country: Das Land in dem sich die Postleitzahl befindet.
        seats-available: Die Anzahl der verfügbaren Plätze.
        seats-needed: Die Anzahl der benötigten Plätze.
        driver-needed: |
          Wird für diese Fahrt noch eine Person gesucht die das Auto fährt? Dann setze bitte dieses Häkchen.
        driver-offer: |
          Könntest du dir vorstellen, das Auto zu fahren?
        notes: |
          Alle zusätzlichen Notizen, die du mit anderen öffentlich teilen möchtest.
          Du kannst hier auch deine Telefonnummer, bevorzugte Kontaktaufnahme oder
          andere Informationen angeben. Beachte bitte, dass alles was du hier angibst
          öffentlich sichtbar ist.

      contact_email:
        name: |
          Dein Name wird in der E-Mail an %{name} weitergegeben.
        from: |
          Deine E-Mail-Adresse wird an %{name} weitergegeben und als Antwortadresse verwendet,
          damit ihr Eure Kommunikation außerhalb von HopHub weiterführen könnt.
        text: |
          Deine Nachricht an %{name}. Sei freundlich und gib so viele Informationen wie möglich an.

    placeholders:
      event:
        name: Gib deinem Event einen Namen
        description: Worum geht es bei diesem Event?
        admin_email: Gib deine E-Mail-Adresse ein
        end_date: Wann ist das Event vorbei?
      entry:
        name: Dein Name oder ein Pseudonym
        email: Deine E-Mail-Adresse
        location: Gib eine Postleitzahl ein
        date: Wähle das Datum und die Uhrzeit deiner Reise
        notes: Noch irgendwas zu sagen? Hier ist Platz dafür.
      entries_filter:
        location: Postleitzahl
        contact_email:
          name: Name oder Pseudonym
          from: E-Mail-Adresse

    errors:
      entry:
        location:
          invalid: Bitte gib eine gültige Postleitzahl ein.

