  meta:
    description:
      default: HopHub ist eine Mitfahr-Plattform für Veranstaltungen.
      event: |
        Mitfahr-Angebote für %{event_name} auf HopHub.
      entry: |
        Mitfahr-Angebot von %{name} für %{event_name} auf HopHub.

  terms_and_conditions:
    prompt: |
      Ich habe die %{tos} und %{privacy_policy} gelesen und stimme diesen zu.
      Außerdem bestätige ich, dass ich kein Roboter bin. Je nach Endgerät kann
      die Überprüfung einen Moment dauern.
    accepted: |
      Die %{tos} und %{privacy_policy} wurden gelesen und akzeptiert.
      Ein Roboter bist du auch nicht. Prima.
    error: |
      Bitte bestätige, dass du die Nutzungsbedingungen und Datenschutzbestimmungen gelesen und akzeptiert hast.
      Überprüfe auch nochmal, ob du nicht doch ein Roboter bist.

  welcome:
    title: Was ist das?
    text:
      - |
        HopHub ist eine Mitfahr-Plattform, die gemeinsames Anreisen zu Veranstaltungen
        vereinfachen und damit die Welt ein bisschen besser machen will. Ganz egal, ob
        ihr das Auto vollmacht, euch ein Zugticket teilt, gemeinsam Bus fahrt, eine
        Fahrradtour plant oder zu Fuß geht.

  how-it-works:
    title: Wie funktioniert das?
    create-event:
      title: Erstelle ein Event
      text: |
        Du erstellst ein neues Event und teilst den Link mit potentiell Teilnehmenden.
        Nur Personen mit dem Link können das Event sehen.
    add-offer:
      title: Biete eine Mitfahrgelegenheit an
      text: |
        Personen, die eine Mitfahrgelegenheit anbieten wollen, können jetzt ein Angebot
        einstellen. Das gilt für Plätze im Auto, aber auch für gemeinsames Reisen mit
        dem Zug, Bus, Fahrrad oder zu Fuß.
        Dafür ist keine Anmeldung erforderlich, nur eine E-Mail-Adresse, an die wir eine
        Bestätigungsmail senden. Nach erfolgter Bestätigung wird der Eintrag angezeigt.
    match:
      title: Nimm Kontakt auf
      text: |
        Bei einem Match können Personen mittels eines Webformulars auf der Website in Kontakt
        treten. Die E-Mail-Adresse des Kontaktaufnehmenden wird als Antwortadresse verwendet,
        damit die Empfängerin direkt antworten kann.
    no-indexing:
      title: Keine Indizierung durch Suchmaschinen
      text: |
        Suchmachinen wie Google oder Bing werden mithilfe von speziellen Tags angewiesen,
        die Events und die dazugehörigen Angebote nicht zu indizieren.
        Nur Personen mit dem Link können die Events sehen.
    cleanup:
      title: Hinterlasse keine Spuren
      text: |
        Angebote und Events werden automatisch aus der Datenbank entfernt
        nachdem deren Gültigkeit vorüber ist.

  hosting-an-event:
    title: Erstelle dein eigenes Event
    text: |
      Du weißt von einer Veranstaltung, zu der Leute gemeinsam anreisen wollen?
      Dann erstelle ein Event und teile den Link mit den Teilnehmenden.

  about:
    title: Das Projekt
    text:
      - |
        HopHub ist ein Open-Source-Projekt, die von Freiwilligen entwickelt wird.
        Wir sind keine Firma und haben keine kommerziellen Interessen.
        Wir nerven euch nicht mit Werbung und geben keine Daten an Dritte weiter.
        Es werden nur die Daten gespeichert, die für den Betrieb der Plattform
        absolut notwendig sind. Mehr dazu in unseren %{privacy_policy} und %{tos}.
      - |
        Wenn du einen Bug melden, ein Feature vorschlagen, eine Übersetzung hinzufügen oder
        einen PR einreichen möchtest, findest du den Quellcode auf %{github_project}.
      - |
        HopHub ist komplett kostenlos und wird es auch immer bleiben.

  cancel: Abbrechen

  transport:
    any: Egal
    car: Auto
    train: Zug
    bus: Bus
    bicycle: Fahrrad
    foot: Zu Fuß
    other: Sonstiges

  offer: Angebot
  offers: Angebote

  way_there: Hinweg
  way_back: Rückweg

  driver-needed: Für diese Fahrt wird ein:e Fahrer:in gesucht!
  driver-offer: |
    %{name} bietet an, das Auto zu fahren.

  no_entries:
    title: Noch keine Angebote
    text: |
      Scheinbar hat noch niemand ein Angebot für dieses Event hinzugefügt.
      Keine Sorge, das ist bei neuen Events ganz normal.
      Du kannst entweder warten, bis jemand ein Angebot erstellt, oder selbst eines hinzufügen.

  add_offer:
    title: Neues Angebot aufgeben
    offer_yourself: |
      Willst du die Fahrt selbst organisieren?
    search_for_people: Suche nach Mitfahrenden

  add_ride_request:
    title: Ich suche eine Mitfahrgelegenheit
    looking_for_ride: |
      Suchst du eine Mitfahrgelegenheit?

  create_new_ride_request:
    title: Anfrage aufgeben
    text: |
      Sag uns, wo du bist und in welche Richtung du eine Mitfahrgelegenheit
      brauchst. Wir benachrichtigen dich per E-Mail, sobald ein passendes
      Angebot eingestellt wird.

  demand_signal:
    title: Fahrten gesucht
    text: Wenn du ein Angebot einstellst, benachrichtigen wir jede unten aufgelistete Person per E-Mail, sofern der Standort deines Angebots innerhalb des von ihr gewählten Radius und der Zeitpunkt innerhalb ihres gewünschten Zeitfensters liegt.
    way_there:
      heading:
        one: "1 Person sucht eine Mitfahrgelegenheit zum Event"
        other: "%{count} Personen suchen eine Mitfahrgelegenheit zum Event"
    way_back:
      heading:
        one: "1 Person sucht eine Mitfahrgelegenheit nach Hause"
        other: "%{count} Personen suchen eine Mitfahrgelegenheit nach Hause"

  show_offers:
    title: Angebote anzeigen
    text: |
      Willst du dich doch lieber anderen anschließen, anstatt selbst ein Angebot zu erstellen?
    current_offers:
      one: Es gibt derzeit ein Angebot für dieses Event!
      other: Es gibt derzeit %{count} Angebote für dieses Event!

  event: Event
  seat:
    one: Platz
    other: Plätze

  create_event:
    title: Event erstellen
    text: |
      Bitte gib die Details zu deinem Event ein. Du erhältst eine E-Mail mit
      einem Link zur Administrationsseite, um einige dieser Details später zu ändern.

  event_valid_until: Event geht bis %{date}

  edit_event:
    title: Event bearbeiten
    text: |
      Bitte gib die Details ein, um dein Event anzupassen.

  update_event:
    title: Event aktualisieren

  event_delete:
    title: Event löschen
    confirmation: |
      Bist du sicher, dass du dieses Event löschen möchtest?
      Alle Angebote werden ebenfalls dauerhaft gelöscht.
      Diese Aktion kann nicht rückgängig gemacht werden.

  entry_delete:
    title: Eintrag löschen
    confirmation: |
      Bist du sicher, dass du diesen Eintrag löschen möchtest?
      Diese Aktion kann nicht rückgängig gemacht werden.

  create_new_offer:
    title: Neues Angebot erstellen
    text: |
      Bitte gib die Details zu deinem Angebot ein. Andere Menschen
      können über die Website Kontakt mit dir aufnehmen, sobald du
      deine E-Mail-Adresse bestätigt hast.

  update_offer:
    title: Angebot aktualisieren

  entries:
    text: |
      Hier findest du alle %{type} für dieses Event.

    none: Keine Einträge gefunden

    filter:
      title: Filtern
      apply: Filter anwenden
      clear: Zurücksetzen
      text: Filtere Angebote für dieses Event nach Ort und Umkreis.
      active: |
        Filter matcht %{n} von %{total} Angeboten.

  entry_contact:
    title: Kontakt
    send: Mail senden
    text: |
      Bitte fülle das Formular aus, um %{name} zu kontaktieren.
    warning: |
      Diese Informationen werden an %{name} gesendet und nicht in der Datenbank von HopHub gespeichert.
      HopHub hat keine Kontrolle darüber, was %{name} mit diesen Informationen macht.

  gdpr_inquiry:
    title: DSGVO-Anfrage
    text:
      - |
        HopHub speichert nur die Daten, die für den Betrieb der Plattform notwendig sind.
        Alle Daten werden automatisch gelöscht, nachdem sie nicht mehr benötigt werden.
        Konkret bedeutet das, dass Events mitsamt aller Angebote nach dem
        Enddatum des Events dauerhaft gelöscht werden. Angebote werden
        ebenfalls gelöscht, sobald sie nicht mehr gültig sind.
      - |
        Wenn du eine Kopie deiner Daten oder eine Löschung deiner Daten wünschst,
        fülle bitte das Formular aus. Wir senden dir eine E-Mail mit allen Informationen,
        die mit dieser Emailadresse in unserer Datenbank gespeichert sind und Links, um
        diese zu löschen.
      - |
        Die E-Mail-Adresse, die du hier angibst, wird nur für die Beantwortung deiner Anfrage
        verwendet und danach gelöscht.
    links: |
      Mehr Informationen findest du in unseren %{privacy_policy} und %{tos}.
    send: Anfrage senden

  views:
    pagination:
      previous: "‹"
      next: "›"
      first: "«"
      last: "»"
      truncate: "&hellip;"

